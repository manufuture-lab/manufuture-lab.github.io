# Configuration of Hugo

title: 'MFL @ HYU'
baseURL: 'https://manufuture-lab.github.io/'

############################
## LANGUAGE
############################

defaultContentLanguage: en
hasCJKLanguage: false
defaultContentLanguageInSubdir: false
removePathAccents: true

############################
## ADVANCED
############################

build:
  writeStats: true

enableGitInfo: false
summaryLength: 30

pagination:
  pagerSize: 10

enableEmoji: true
enableRobotsTXT: true
footnotereturnlinkcontents: <sup>^</sup>

ignoreFiles:
  - ".ipynb_checkpoints$"
  - "\\.Rmd$"
  - "\\.Rmarkdown$"
  - "_cache$"

disableAliases: true

outputs:
  home:
    - HTML
    - RSS
  section:
    - HTML
    - RSS

imaging:
  resampleFilter: lanczos
  quality: 90
  anchor: smart
  hint: picture

timeout: 600000

taxonomies:
  tag: tags
  category: categories
  author: authors

markup:
  _merge: deep
  highlight:
    lineNos: false
  goldmark:
    renderer:
      unsafe: true

security:
  _merge: deep

sitemap:
  _merge: deep
