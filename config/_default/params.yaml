    search: false
    theme_toggle: false
    theme_picker: false
    language_switcher: false
    cta:
      enable: false
      text: ""
      url: ""

  footer:
    enable: true
    style: minimal
    show_logo: true
    logo: "media/footerlogo.png"
    show_title: false
    show_tagline: false
    title: ""
    language_switcher: false
    show_social: false
    text: |
      한양대학교 미래제조 연구실 (ManuFuture Laboratory)

      | Email: @hanyang.ac.kr | Tel: +82 031-000-0000 |

      | Address: Room 000, Bldg 000, 55 Hanyangdaehak-ro, Sangnok-gu, Ansan, Gyeonggi-do, 15588, Republic of Korea |

  copyright:
    notice: "Copyright © ManuFuture Laboratory. All Rights Reserved."
    license:
      type: all_rights
      allow_derivatives: false
      share_alike: true
      allow_commercial: false

  seo:
    title: ""
    location:
      address:
        street: ""
        city: ""
        region: ""
        postal_code: ""
        country: ""
      coordinates:
        latitude: null
        longitude: null
      phone: ""
    ai:
      allow:
        - /
      disallow: []
      note: ""
      contact: ""

  content:
