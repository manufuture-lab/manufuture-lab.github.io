hugoblox:
  schema: "2.0"

  identity:
    name: "MFL @ HYU"
    logo: "media/logo.png"
    organization: "ManuFuture Laboratory"
    type: organization
    tagline: ""
    description: "ManuFuture Laboratory at Hanyang University"
    social:
      twitter: ""

  theme:
    mode: light
    pack: "default"
    colors:
      primary: ""
      secondary: ""
      neutral: ""
    colors_light: {}
    colors_dark: {}
    surfaces:
      background: ""
      foreground: ""
      header:
